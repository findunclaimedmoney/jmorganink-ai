kind = "web"
previewPath = "/"
title = "Glimr Studio"
version = "1.0.0"
id = "artifacts/glimr"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24553

[services.development]
run = "pnpm --filter @workspace/glimr run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/glimr", "run", "build" ]
publicDir = "artifacts/glimr/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24553"
BASE_PATH = "/"
